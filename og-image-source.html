<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

  <div id="scaler">

        <svg width="228" height="92" viewBox="0 0 250 96" aria-label="valanto"><text x="0" y="78" font-family="'Archivo',sans-serif" font-size="72" font-weight="700" fill="#FAF7F2" letter-spacing="-2">valanto</text><path d="M1 33 L19 18 L37 33" fill="none" stroke="#3FB0C0" stroke-width="8" stroke-linejoin="miter" stroke-linecap="butt"></path></svg>

      </div>
      <div style="font-family:'Archivo',sans-serif;font-size:62px;font-weight:800;line-height:1.04;color:#FAF7F2;letter-spacing:-0.03em">Bewerten, vermarkten, verwalten – in einem Werkzeug.</div>
